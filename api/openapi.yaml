        translated_name: { type: string, nullable: true }

    Series:
      x-go-type: pixivgo.Series
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv returns `{}` instead of `null` for empty series; in that case `id` is 0.
      required: [id, title]
      properties:
        id:    { type: integer, format: int64 }
        title: { type: string }

    MetaSinglePage:
      x-go-type: pixivgo.MetaSinglePage
      x-go-type-import: *pixivgoImport
      type: object
      properties:
        original_image_url: { type: string }

    MetaPage:
      x-go-type: pixivgo.MetaPage
      x-go-type-import: *pixivgoImport
      type: object
      required: [image_urls]
      properties:
        image_urls: { $ref: '#/components/schemas/ImageUrls' }

    Novel:
      x-go-type: pixivgo.NovelInfo
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv novel metadata. Shape mirrors pixivgo.NovelInfo.
      required:
        - id
        - title
        - caption
        - restrict
        - x_restrict
        - is_original
        - image_urls
        - create_date
        - tags
        - page_count
        - text_length
        - user
        - series
        - is_bookmarked
        - total_bookmarks
        - total_view
        - visible
        - total_comments
        - is_muted
        - is_mypixiv_only
        - is_x_restricted
        - novel_ai_type
      properties:
        id:              { type: integer, format: int64 }
        title:           { type: string }
        caption:         { type: string }
        restrict:        { type: integer, format: int64 }
        x_restrict:      { type: integer, format: int64 }
        is_original:     { type: boolean }
        image_urls:      { $ref: '#/components/schemas/ImageUrls' }
        create_date:     { type: string }
        tags:
          type: array
          items: { $ref: '#/components/schemas/NovelTag' }
        page_count:      { type: integer, format: int64 }
        text_length:     { type: integer, format: int64 }
        user:            { $ref: '#/components/schemas/User' }
        series:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Series'
        is_bookmarked:   { type: boolean }
        total_bookmarks: { type: integer, format: int64 }
        total_view:      { type: integer, format: int64 }
        visible:         { type: boolean }
        total_comments:  { type: integer, format: int64 }
        is_muted:        { type: boolean }
        is_mypixiv_only: { type: boolean }
        is_x_restricted: { type: boolean }
        novel_ai_type:   { type: integer, format: int64 }
        comment_access_control: { type: integer, format: int64 }

    NovelTag:
      x-go-type: pixivgo.NovelTag
      x-go-type-import: *pixivgoImport
      type: object
      required: [name, translated_name, added_by_uploaded_user]
      properties:
        name:                   { type: string }
        translated_name:        { type: string, nullable: true }
        added_by_uploaded_user: { type: boolean }

    UgoiraMetadata:
      x-go-type: pixivgo.UgoiraMetadata
      x-go-type-import: *pixivgoImport
      type: object
      required: [zip_urls, frames]
      properties:
        zip_urls: { $ref: '#/components/schemas/UgoiraZipUrls' }
        frames:
          type: array
          items: { $ref: '#/components/schemas/UgoiraFrame' }

    UgoiraZipUrls:
      x-go-type: pixivgo.UgoiraZipUrls
      x-go-type-import: *pixivgoImport
      type: object
      required: [medium]
      properties:
        medium: { type: string }

    UgoiraFrame:
      x-go-type: pixivgo.UgoiraFrame
      x-go-type-import: *pixivgoImport
      type: object
      required: [file, delay]
      properties:
        file:  { type: string }
        delay: { type: integer, format: int64 }

    DownloadStatus:
      type: string
      description: Lifecycle state of a download job or task.
      enum: [queued, running, completed, failed, cancelled]

    DownloadIllustType:
      type: string
      description: Pixiv artwork type the job was created for.
      enum: [illust, manga, ugoira]

    DownloadTask:
      type: object
      required: [id, job_id, url, file_path, status, size_bytes, downloaded_bytes]
      properties:
        id:               { type: string }
        job_id:           { type: string }
        url:              { type: string, description: "Final request URL." }
        file_path:        { type: string, description: "Target path on disk." }
        status:           { $ref: '#/components/schemas/DownloadStatus' }
        size_bytes:       { type: integer, format: int64, description: "Content-Length, or -1 if unknown." }
        downloaded_bytes: { type: integer, format: int64 }
        error:            { type: string, nullable: true }
        started_at:       { type: string, format: date-time, nullable: true }
        finished_at:      { type: string, format: date-time, nullable: true }

    DownloadJob:
      type: object
      required: [id, illust_id, illust_type, status, created_at, updated_at, tasks]
      properties:
        id:          { type: string }
        illust_id:   { type: integer, format: int64 }
        illust_type: { $ref: '#/components/schemas/DownloadIllustType' }
        title:       { type: string }
        preview_url: { type: string, description: "Thumbnail (square_medium → medium → large). Absent on jobs persisted before this field existed." }
        status:      { $ref: '#/components/schemas/DownloadStatus' }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/DownloadTask' }

    DownloadJobList:
      type: object
      required: [jobs, total, page, per_page, active_count, done_count]
      properties:
        jobs:
          type: array
          items: { $ref: '#/components/schemas/DownloadJob' }
        total:
          type: integer
          description: Total jobs matching the filter (status + updated_since).
        page:
          type: integer
          minimum: 1
          description: Echo of the requested 1-based page index after clamping.
        per_page:
          type: integer
          minimum: 1
          description: Echo of the effective page size after clamping.
        active_count:
          type: integer
          description: |
            Global count of `queued` + `running` jobs (independent of filter).
            Drives the sidebar badge.
        done_count:
          type: integer
          description: Global count of `completed` jobs (independent of filter).

    SubmitDownloadRequest:
      type: object
      required: [illust_id]
      properties:
        illust_id:
          type: integer
          format: int64
          minimum: 1
          description: Pixiv illustration ID.

    ClearDownloadsResponse:
      type: object
      required: [removed]
      properties:
        removed:
          type: integer
          description: Number of jobs deleted from history.

    ConfigSource:
      type: string
      enum: [defaults, file, env]
      description: |
        Which config layer supplied the effective value for a key.
        `env` always wins; `file` overrides `defaults`.

    ConfigView:
      type: object
      required: [effective, file, sources, pending_restart, schema_version]
      properties:
        effective:
          type: object
          additionalProperties: true
          description: |
            Nested map of the values the running process is actually using.
            Hot-reloadable keys advance immediately on PATCH/RESET;
            restart-required keys stay pinned to the startup value until
            the process restarts (and meanwhile appear in `pending_restart`).
            Sensitive fields masked.
        file:
          type: object
          additionalProperties: true
          description: |
            Nested map of overrides currently persisted in settings.json.
            Advances on every successful PATCH/RESET. Sensitive fields masked.
        sources:
          type: object
          description: Per dotted-key origin label; each value is one of `defaults`, `file`, `env`.
          additionalProperties:
            $ref: '#/components/schemas/ConfigSource'
        pending_restart:
          type: array
          items: { type: string }
          description: |
            Restart-required dotted keys whose persisted value differs from
            the value the process started with — i.e. changes saved but not
            yet in effect. Empty when nothing is awaiting a restart. Apply
            them with `POST /config/restart`.
        schema_version:
          type: string
          description: |
            Bumps when the shape of settings.json changes incompatibly.
            Frontend can refuse / migrate when its compiled schema doesn't match.

    ConfigRestartAccepted:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Always `restarting`.
          example: restarting

    ConfigPatch:
      type: object
      additionalProperties: true
      description: |
        Free-form map of writes. Keys are either nested (matching the
        struct shape) or flat dotted paths (e.g. `"download.max_concurrent": 8`);
        both forms are accepted. Sending the sensitive mask sentinel
        (`***`) or `""` for a sensitive field is a no-op.

    ConfigResetRequest:
      type: object
      properties:
        keys:
          type: array
          items: { type: string }
          description: Dotted-path keys to drop from the file layer.
        all:
          type: boolean
          description: |
            When true, clear the entire file layer. Mutually exclusive
            with `keys`; sending both is rejected with 400.

    NamingPreviewRequest:
      type: object
      description: |
        Candidate download naming templates to render. All three are
        optional; any omitted field falls back to the current effective
        value. Mirrors the three `download.*` template keys. Nothing is
        persisted — this is a render-only preview.
      properties:
        output_dir:
          type: string
          description: Candidate `download.output_dir` template.
        file_template:
          type: string
          description: Candidate `download.file_template` template.
        file_group_template:
          type: string
          description: Candidate `download.file_group_template` template.

    NamingPreviewResponse:
      type: object
      required: [output_dir, single_page, multi_page, fields]
      properties:
        output_dir:
          type: string
          description: Rendered `output_dir` (absolute/relative aware). Empty if it failed to parse/render.
        single_page:
          type: string
          description: |
            Full example path for a single-page work: `output_dir` joined
            with `file_template` (Index 0, sample `.jpg`). Empty if either
            template failed.
        multi_page:
          type: string
          description: |
            Full example path for a multi-page work: `output_dir` joined
            with `file_group_template` at page Index 2 (demonstrates
            `pad`, sample `.png`). Empty if either template failed.
        fields:
          type: object
          additionalProperties: { type: string }
          description: |
            Per-template error messages keyed by dotted config path
            (`download.output_dir` / `download.file_template` /
            `download.file_group_template`). A key is present only when
            that template failed to parse or render; an empty/absent map
            means every template rendered cleanly. Present even on 200.
