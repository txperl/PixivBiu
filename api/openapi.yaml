openapi: 3.0.3
info:
  title: PixivBiu v3 API
  version: 0.1.0
  description: |
    PixivBiu v3 backend API. Read-only browsing + auth + bookmark/follow.
    Path items are split across files under `paths/` by domain;
    schemas and shared parameters stay centralised here.
servers:
  - url: /api/v1

tags:
  - name: system
  - name: auth
  - name: illusts
  - name: users
  - name: search
  - name: downloads
  - name: events
  - name: config
  - name: proxy

paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service health
      tags: [system]
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

  /system/version:
    $ref: './paths/system.yaml#/version'
  /system/update:
    $ref: './paths/system.yaml#/update'
  /system/update/check:
    $ref: './paths/system.yaml#/updateCheck'
  /system/update/apply:
    $ref: './paths/system.yaml#/updateApply'

  /auth/login:
    $ref: './paths/auth.yaml#/login'
  /auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /auth/status:
    $ref: './paths/auth.yaml#/status'
  /auth/oauth/start:
    $ref: './paths/auth.yaml#/oauthStart'
  /auth/oauth/exchange:
    $ref: './paths/auth.yaml#/oauthExchange'
  /auth/connectivity:
    $ref: './paths/auth.yaml#/connectivity'

  /illusts/ranking:
    $ref: './paths/illusts.yaml#/ranking'
  /illusts/recommended:
    $ref: './paths/illusts.yaml#/recommended'
  /illusts/following:
    $ref: './paths/illusts.yaml#/following'
  /illusts/{id}:
    $ref: './paths/illusts.yaml#/byId'
  /illusts/{id}/ugoira:
    $ref: './paths/illusts.yaml#/ugoira'
  /illusts/{id}/bookmark:
    $ref: './paths/illusts.yaml#/bookmark'

  /users/{id}:
    $ref: './paths/users.yaml#/byId'
  /users/{id}/illusts:
    $ref: './paths/users.yaml#/illusts'
  /users/{id}/bookmarks:
    $ref: './paths/users.yaml#/bookmarks'
  /users/{id}/following:
    $ref: './paths/users.yaml#/following'
  /users/{id}/follow:
    $ref: './paths/users.yaml#/follow'

  /search/illusts:
    $ref: './paths/search.yaml#/illusts'
  /search/users:
    $ref: './paths/search.yaml#/users'

  /downloads:
    $ref: './paths/downloads.yaml#/root'
  /downloads/{id}:
    $ref: './paths/downloads.yaml#/byId'
  /downloads/{id}/cancel:
    $ref: './paths/downloads.yaml#/byIdCancel'

  /events:
    $ref: './paths/events.yaml#/stream'

  /config:
    $ref: './paths/config.yaml#/root'
  /config/schema:
    $ref: './paths/config.yaml#/schema'
  /config/reset:
    $ref: './paths/config.yaml#/reset'
  /config/restart:
    $ref: './paths/config.yaml#/restart'
  /config/naming/preview:
    $ref: './paths/config.yaml#/namingPreview'

  /proxy/img:
    $ref: './paths/proxy.yaml#/img'

components:
  parameters:
    IllustIdPath:
      name: id
      in: path
      required: true
      description: Pixiv illustration ID.
      schema: { type: integer, format: int64, minimum: 1 }
    UserIdPath:
      name: id
      in: path
      required: true
      description: Pixiv user ID.
      schema: { type: integer, format: int64, minimum: 1 }
    OffsetQuery:
      name: offset
      in: query
      required: false
      description: Offset for offset-paginated list endpoints.
      schema: { type: integer, format: int64, minimum: 0, default: 0 }
    MaxBookmarkIdQuery:
      name: max_bookmark_id
      in: query
      required: false
      description: Cursor for the next bookmarks page; pass `next_max_bookmark_id` from the previous response.
      schema: { type: integer, format: int64, minimum: 1 }
    RestrictQuery:
      name: restrict
      in: query
      required: false
      description: Visibility scope (public or private).
      schema: { $ref: '#/components/schemas/Restrict' }
    IllustTypeQuery:
      name: type
      in: query
      required: false
      description: Illust type filter; both are returned when omitted (where supported).
      schema: { $ref: '#/components/schemas/IllustType' }
    ClientModeQuery:
      name: client_mode
      in: query
      required: false
      description: |
        Client emulation mode (Pixiv's `filter` query). Omit (= `for_ios`)
        to apply the same policy filter as the official iOS client;
        pass `none` to disable.
      schema: { $ref: '#/components/schemas/ClientMode' }
    DurationQuery:
      name: duration
      in: query
      required: false
      description: Time-window filter for search results.
      schema: { $ref: '#/components/schemas/SearchDuration' }
    ExcludeAiQuery:
      name: exclude_ai
      in: query
      required: false
      description: |
        When true, exclude AI-generated works from search results
        (Pixiv `search_ai_type=1`). Omit or set false to include them.
      schema: { type: boolean }
    BookmarkTagQuery:
      name: tag
      in: query
      required: false
      description: Restrict bookmarks to those tagged with this exact tag name.
      schema: { type: string, minLength: 1 }
    IncludeRankingIllustsQuery:
      name: include_ranking_illusts
      in: query
      required: false
      description: |
        When false, omit the daily-ranking section Pixiv injects into the
        recommended feed. Omit to keep Pixiv's default behaviour.
      schema: { type: boolean }
    DownloadIdPath:
      name: id
      in: path
      required: true
      description: Download job identifier returned by `POST /downloads`.
      schema: { type: string, minLength: 1 }
    DownloadStatusListQuery:
      name: status
      in: query
      required: false
      description: |
        Comma-separated subset of `DownloadStatus` to include. Omit for no
        filter. Example: `queued,running`.
      schema:
        type: string
      example: queued,running
    DownloadPageQuery:
      name: page
      in: query
      required: false
      description: 1-based page index.
      schema: { type: integer, minimum: 1, default: 1 }
    DownloadPerPageQuery:
      name: per_page
      in: query
      required: false
      description: Items per page; clamped to `[1, 100]`.
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    DownloadUpdatedSinceQuery:
      name: updated_since
      in: query
      required: false
      description: |
        RFC3339 timestamp. Only jobs with `updated_at >= updated_since`
        are returned. Used by the frontend to load the recent-tracked
        window without scanning the whole history.
      schema: { type: string, format: date-time }

  responses:
    NoContent:
      description: Action succeeded; no body.
    Unauthenticated:
      description: No valid Pixiv session. Call `POST /auth/login` first.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found on Pixiv.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Invalid parameters.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Request not allowed (e.g. missing the app's required header).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflicts with the current state (e.g. an operation already in progress).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Upstream:
      description: Pixiv upstream returned an unexpected error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string, example: ok }

    SystemVersion:
      type: object
      required: [version, go_version, os, arch]
      properties:
        version:    { type: string, description: "Binary version (main.version), e.g. 3.0.0 or 0.1.0-dev." }
        go_version: { type: string, example: go1.26.1 }
        os:         { type: string, example: darwin }
        arch:       { type: string, example: arm64 }

    UpdateStatus:
      type: object
      required: [current_version, update_available, is_dev]
      properties:
        current_version:
          type: string
          description: The running binary's version.
        latest_version:
          type: string
          description: Newest applicable release tag (normalized, e.g. v3.1.0). Empty until a check succeeds.
        update_available:
          type: boolean
          description: A newer release exists AND this is a real release build.
        is_dev:
          type: boolean
          description: |
            Running a dev/non-release build (e.g. `0.1.0-dev`, a `go run`, or a
            git-describe build). Updates are never offered or applied for these.
        release_url:
          type: string
          description: GitHub release page for `latest_version`.
        release_notes:
          type: string
          description: Release body (markdown) as published on GitHub.
        published_at:
          type: string
          format: date-time
          nullable: true
          description: When `latest_version` was published.
        asset_name:
          type: string
          description: The release archive matching this OS/arch (the file Apply downloads).
        last_checked:
          type: string
          format: date-time
          nullable: true
          description: When this status was produced; absent if never checked.
        last_error:
          type: string
          description: Human-safe error from the most recent check, if any.

    UpdateApplyAccepted:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Always `updating`.
          example: updating

    Error:
      type: object
      required: [code, kind, message]
      properties:
        code:
          type: string
          description: Machine-readable error code.
          enum:
            - unauthenticated
            - bad_request
            - not_found
            - conflict
            - forbidden
            - rate_limited
            - upstream_error
            - internal_error
          example: unauthenticated
        kind:
          type: string
          description: |
            Rendering discriminator. Tells the client what's in `message`
            and which optional fields are populated:
              - `validation`: client supplied bad input; `message` is a
                generic summary, `fields` carries per-key validation
                messages.
              - `app`: backend-authored, safe to show verbatim.
              - `upstream`: Pixiv rejected the request; `message` is a
                generic phrase and `upstream.reason` carries a stable
                token for i18n. The raw upstream body is never on the
                wire.
              - `internal`: unexpected server failure; `message` is a
                fixed generic string and `request_id` should be surfaced
                so the user can quote it.
          enum: [validation, app, upstream, internal]
        message:
          type: string
          description: |
            Always safe to display verbatim. Authored by the backend's
            `classify` function only; never contains `err.Error()` text
            or upstream response body.
        fields:
          type: object
          additionalProperties: { type: string }
          description: |
            Populated only when `kind=validation`. Per-key validation
            messages keyed by dotted config path. The reserved key `_`
            carries a non-field general message.
        upstream:
          type: object
          required: [status, reason]
          properties:
            status:
              type: integer
              description: HTTP status returned by Pixiv.
            reason:
              type: string
              enum: [invalid_grant, rate_limit, generic]
              description: |
                Backend-classified stable token for the upstream failure.
                `generic` is the fallback for any Pixiv error we don't
                yet distinguish; the raw body is logged server-side and
                never forwarded.
          description: Populated only when `kind=upstream`.
        request_id:
          type: string
          description: |
            Per-request identifier from the chi RequestID middleware.
            Set on every backend-produced error so users can quote it
            for log lookup. Absent for client-side synthetic errors.

    Restrict:
      type: string
      enum: [public, private]
      default: public

    IllustType:
      type: string
      enum: [illust, manga]

    ClientMode:
      type: string
      enum: [for_ios, none]
      description: |
        Pixiv `filter` knob — controls iOS-app-style content gating.
        `for_ios` applies Pixiv's iOS-client policy filter; `none` disables
        it. Named `client_mode` here to avoid collision with the generic
        notion of "filtering".

    SearchDuration:
      type: string
      enum: [within_last_day, within_last_week, within_last_month]

    RankingMode:
      type: string
      enum:
        - day
        - week
        - month
        - day_male
        - day_female
        - week_original
        - week_rookie
        - day_manga
        - day_r18
        - day_male_r18
        - day_female_r18
        - week_r18
        - week_r18g

    SearchTarget:
      type: string
      enum:
        - partial_match_for_tags
        - exact_match_for_tags
        - title_and_caption
        - keyword
      default: partial_match_for_tags

    SearchSort:
      type: string
      enum: [date_desc, date_asc, popular_desc]
      default: date_desc

    LoginRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Long-lived Pixiv OAuth refresh token. See README for how to obtain.

    OAuthStartResponse:
      type: object
      required: [state, login_url]
      properties:
        state:
          type: string
          description: |
            Opaque handle the client must echo back to `/auth/oauth/exchange`.
            The server uses it to look up the matching PKCE verifier.
        login_url:
          type: string
          description: |
            Pixiv-hosted login URL the client should open in a popup. After
            the user authenticates Pixiv redirects to a fixed callback URL
            that carries `?code=…`; the user pastes that URL (or just the
            code) back into the client.

    OAuthExchangeRequest:
      type: object
      required: [state, code]
      properties:
        state:
          type: string
          description: The `state` returned by `/auth/oauth/start`.
        code:
          type: string
          description: |
            Either the bare authorisation `code` Pixiv emitted, or the full
            callback URL the user pasted (the server extracts `?code=…`).

    AuthStatus:
      type: object
      required: [authenticated]
      properties:
        authenticated: { type: boolean }
        session_expired:
          type: boolean
          nullable: true
          description: >-
            True when the previous session was cleared because Pixiv rejected the
            refresh token (invalid_grant) — distinct from a first-run "never logged
            in" state. The login page surfaces a "session expired, please sign in
            again" hint when set. Only meaningful while unauthenticated; false or
            absent otherwise.
        user_id:       { type: integer, format: int64, nullable: true }
        user_name:     { type: string, nullable: true }
        expires_at:    { type: string, format: date-time, nullable: true }

    ConnectivityRequest:
      type: object
      properties:
        proxy:
          type: string
          description: |
            Optional proxy URL to test (e.g. `http://127.0.0.1:7890` or
            `socks5://127.0.0.1:1080`). Omit to probe the current
            configuration as-is. When the probe succeeds with a supplied
            proxy and there's no Pixiv session yet, the proxy is persisted
            to settings so the subsequent login uses it.

    ConnectivityStatus:
      type: object
      required: [reachable]
      properties:
        reachable:
          type: boolean
          description: Whether any HTTP response came back from Pixiv over the tested path.
        latency_ms:
          type: integer
          description: Round-trip time of the probe request, in milliseconds.

    BookmarkRequest:
      type: object
      properties:
        restrict: { $ref: '#/components/schemas/Restrict' }

    BookmarkDetail:
      type: object
      required: [is_bookmarked, restrict]
      properties:
        is_bookmarked: { type: boolean }
        restrict:      { $ref: '#/components/schemas/Restrict' }

    FollowRequest:
      type: object
      properties:
        restrict: { $ref: '#/components/schemas/Restrict' }

    # The schemas below (plus the pixivgo sub-schemas defined further down,
    # after UgoiraMetadataResponse) carry `x-go-type` so oapi-codegen aliases
    # them to `pixivgo.*` (zero handler conversion, FlexInt and nullable
    # semantics preserved). `properties` sit alongside `x-go-type` so non-Go
    # consumers (openapi-typescript, Swagger UI, /openapi.json) see the wire
    # format. Keep `properties` in sync with pixivgo's models.go on upgrades.
    Illust:
      x-go-type: pixivgo.IllustrationInfo
      x-go-type-import: &pixivgoImport
        name: pixivgo
        path: github.com/txperl/pixivgo
      type: object
      description: Pixiv illustration metadata. Shape mirrors pixivgo.IllustrationInfo.
      required:
        - id
        - title
        - type
        - image_urls
        - caption
        - restrict
        - user
        - tags
        - tools
        - create_date
        - page_count
        - width
        - height
        - sanity_level
        - x_restrict
        - series
        - meta_single_page
        - meta_pages
        - total_view
        - total_bookmarks
        - is_bookmarked
        - visible
        - is_muted
        - illust_ai_type
        - illust_book_style
        - restriction_attributes
      properties:
        id:                { type: integer, format: int64 }
        title:             { type: string }
        type:              { type: string }
        image_urls:        { $ref: '#/components/schemas/ImageUrls' }
        caption:           { type: string }
        restrict:          { type: integer, format: int64 }
        user:              { $ref: '#/components/schemas/User' }
        tags:
          type: array
          items: { $ref: '#/components/schemas/IllustrationTag' }
        tools:
          type: array
          items: { type: string }
        create_date:       { type: string }
        page_count:        { type: integer, format: int64 }
        width:             { type: integer, format: int64 }
        height:            { type: integer, format: int64 }
        sanity_level:      { type: integer, format: int64 }
        x_restrict:        { type: integer, format: int64 }
        # OpenAPI 3.0: `nullable` on a bare $ref is ignored, so wrap in allOf.
        series:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Series'
        meta_single_page:  { $ref: '#/components/schemas/MetaSinglePage' }
        meta_pages:
          type: array
          items: { $ref: '#/components/schemas/MetaPage' }
        total_view:        { type: integer, format: int64 }
        total_bookmarks:   { type: integer, format: int64 }
        is_bookmarked:     { type: boolean }
        visible:           { type: boolean }
        is_muted:          { type: boolean }
        illust_ai_type:    { type: integer, format: int64 }
        illust_book_style: { type: integer, format: int64 }
        total_comments:    { type: integer, format: int64 }
        restriction_attributes:
          type: array
          items: { type: string }

    User:
      x-go-type: pixivgo.UserInfo
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv user summary. Shape mirrors pixivgo.UserInfo.
      required: [id, name, account, profile_image_urls, is_followed]
      properties:
        id:                      { type: integer, format: int64 }
        name:                    { type: string }
        account:                 { type: string }
        profile_image_urls:      { $ref: '#/components/schemas/ProfileImageUrls' }
        comment:                 { type: string }
        is_followed:             { type: boolean, nullable: true }
        is_access_blocking_user: { type: boolean }
        is_accept_request:       { type: boolean }

    UserPreview:
      x-go-type: pixivgo.UserPreview
      x-go-type-import: *pixivgoImport
      type: object
      description: User + a few sample illusts. Shape mirrors pixivgo.UserPreview.
      required: [user, illusts, novels, is_muted]
      properties:
        user: { $ref: '#/components/schemas/User' }
        illusts:
          type: array
          items: { $ref: '#/components/schemas/Illust' }
        novels:
          type: array
          items: { $ref: '#/components/schemas/Novel' }
        is_muted: { type: boolean }

    IllustPage:
      type: object
      required: [illusts]
      properties:
        illusts:
          type: array
          items: { $ref: '#/components/schemas/Illust' }
        next_offset:
          type: integer
          format: int64
          nullable: true
          description: Next offset to pass back, or null if no further page.
        next_max_bookmark_id:
          type: integer
          format: int64
          nullable: true
          description: Set only by `/users/{id}/bookmarks`; pass back as `max_bookmark_id`.

    UserIllustsPage:
      type: object
      required: [user, illusts]
      properties:
        user:
          $ref: '#/components/schemas/User'
        illusts:
          type: array
          items: { $ref: '#/components/schemas/Illust' }
        next_offset:
          type: integer
          format: int64
          nullable: true

    UserDetailPage:
      type: object
      required: [user, profile, profile_publicity, workspace]
      properties:
        user:              { $ref: '#/components/schemas/User' }
        profile:           { $ref: '#/components/schemas/Profile' }
        profile_publicity: { $ref: '#/components/schemas/ProfilePublicity' }
        workspace:         { $ref: '#/components/schemas/Workspace' }

    Profile:
      x-go-type: pixivgo.Profile
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv user profile. Shape mirrors pixivgo.Profile.
      required:
        - webpage
        - gender
        - birth
        - birth_day
        - birth_year
        - region
        - address_id
        - country_code
        - job
        - job_id
        - total_follow_users
        - total_mypixiv_users
        - total_illusts
        - total_manga
        - total_novels
        - total_illust_bookmarks_public
        - total_illust_series
        - total_novel_series
        - background_image_url
        - twitter_account
        - twitter_url
        - pawoo_url
        - is_premium
        - is_using_custom_profile_image
      properties:
        webpage:                        { type: string, nullable: true }
        gender:                         { type: string }
        birth:                          { type: string }
        birth_day:                      { type: string }
        birth_year:                     { type: integer, format: int64 }
        region:                         { type: string }
        address_id:                     { type: integer, format: int64 }
        country_code:                   { type: string }
        job:                            { type: string }
        job_id:                         { type: integer, format: int64 }
        total_follow_users:             { type: integer, format: int64 }
        total_mypixiv_users:            { type: integer, format: int64 }
        total_illusts:                  { type: integer, format: int64 }
        total_manga:                    { type: integer, format: int64 }
        total_novels:                   { type: integer, format: int64 }
        total_illust_bookmarks_public:  { type: integer, format: int64 }
        total_illust_series:            { type: integer, format: int64 }
        total_novel_series:             { type: integer, format: int64 }
        background_image_url:           { type: string }
        twitter_account:                { type: string }
        twitter_url:                    { type: string, nullable: true }
        pawoo_url:                      { type: string, nullable: true }
        is_premium:                     { type: boolean }
        is_using_custom_profile_image:  { type: boolean }

    ProfilePublicity:
      x-go-type: pixivgo.ProfilePublicity
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv profile publicity flags. Shape mirrors pixivgo.ProfilePublicity.
      required: [gender, region, birth_day, birth_year, job, pawoo]
      properties:
        gender:     { type: string }
        region:     { type: string }
        birth_day:  { type: string }
        birth_year: { type: string }
        job:        { type: string }
        pawoo:      { type: boolean }

    Workspace:
      x-go-type: pixivgo.Workspace
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv workspace info. Shape mirrors pixivgo.Workspace.
      required:
        - pc
        - monitor
        - tool
        - scanner
        - tablet
        - mouse
        - printer
        - desktop
        - music
        - desk
        - chair
        - comment
        - workspace_image_url
      properties:
        pc:                  { type: string }
        monitor:             { type: string }
        tool:                { type: string }
        scanner:             { type: string }
        tablet:              { type: string }
        mouse:               { type: string }
        printer:             { type: string }
        desktop:             { type: string }
        music:               { type: string }
        desk:                { type: string }
        chair:               { type: string }
        comment:             { type: string }
        workspace_image_url: { type: string, nullable: true }

    UserPreviewPage:
      type: object
      required: [user_previews]
      properties:
        user_previews:
          type: array
          items: { $ref: '#/components/schemas/UserPreview' }
        next_offset:
          type: integer
          format: int64
          nullable: true

    IllustDetailResponse:
      x-go-type: pixivgo.IllustDetailResponse
      x-go-type-import: *pixivgoImport
      type: object
      description: Wrapper for a single illust detail. Mirrors pixivgo.IllustDetailResponse.
      required: [illust]
      properties:
        illust: { $ref: '#/components/schemas/Illust' }

    UgoiraMetadataResponse:
      x-go-type: pixivgo.UgoiraMetadataResponse
      x-go-type-import: *pixivgoImport
      type: object
      description: Ugoira (animated illust) metadata. Mirrors pixivgo.UgoiraMetadataResponse.
      required: [ugoira_metadata]
      properties:
        ugoira_metadata: { $ref: '#/components/schemas/UgoiraMetadata' }

    # --- pixivgo sub-schemas ----------------------------------------------
    # Same `x-go-type` pattern as the schemas above: oapi-codegen emits these
    # as type aliases to pixivgo.*; the explicit properties exist only for
    # non-Go consumers of the spec.
    ProfileImageUrls:
      x-go-type: pixivgo.ProfileImageUrls
      x-go-type-import: *pixivgoImport
      type: object
      required: [medium]
      properties:
        medium: { type: string }

    ImageUrls:
      x-go-type: pixivgo.ImageUrls
      x-go-type-import: *pixivgoImport
      type: object
      required: [square_medium, medium, large]
      properties:
        square_medium: { type: string }
        medium:        { type: string }
        large:         { type: string }
        # Only present on per-page image_urls (meta_pages); omitted on the
        # top-level illust image_urls — hence optional, not required.
        original:      { type: string }

    IllustrationTag:
      x-go-type: pixivgo.IllustrationTag
      x-go-type-import: *pixivgoImport
      type: object
