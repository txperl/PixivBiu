openapi: 3.0.3
info:
  title: PixivBiu v3 API
  version: 0.1.0
  description: |
    PixivBiu v3 backend API. Read-only browsing + auth + bookmark/follow.
    Path items are split across files under `paths/` by domain;
    schemas and shared parameters stay centralised here.
servers:
  - url: /api/v1

tags:
  - name: system
  - name: auth
  - name: illusts
  - name: users
  - name: search
  - name: downloads
  - name: events

paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service health
      tags: [system]
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

  /auth/login:
    $ref: './paths/auth.yaml#/login'
  /auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /auth/status:
    $ref: './paths/auth.yaml#/status'

  /illusts/ranking:
    $ref: './paths/illusts.yaml#/ranking'
  /illusts/recommended:
    $ref: './paths/illusts.yaml#/recommended'
  /illusts/following:
    $ref: './paths/illusts.yaml#/following'
  /illusts/{id}:
    $ref: './paths/illusts.yaml#/byId'
  /illusts/{id}/ugoira:
    $ref: './paths/illusts.yaml#/ugoira'
  /illusts/{id}/bookmark:
    $ref: './paths/illusts.yaml#/bookmark'

  /users/{id}:
    $ref: './paths/users.yaml#/byId'
  /users/{id}/illusts:
    $ref: './paths/users.yaml#/illusts'
  /users/{id}/bookmarks:
    $ref: './paths/users.yaml#/bookmarks'
  /users/{id}/following:
    $ref: './paths/users.yaml#/following'
  /users/{id}/follow:
    $ref: './paths/users.yaml#/follow'

  /search/illusts:
    $ref: './paths/search.yaml#/illusts'
  /search/users:
    $ref: './paths/search.yaml#/users'

  /downloads:
    $ref: './paths/downloads.yaml#/root'
  /downloads/{id}:
    $ref: './paths/downloads.yaml#/byId'
  /downloads/{id}/cancel:
    $ref: './paths/downloads.yaml#/byIdCancel'

  /events:
    $ref: './paths/events.yaml#/stream'

components:
  parameters:
    IllustIdPath:
      name: id
      in: path
      required: true
      description: Pixiv illustration ID.
      schema: { type: integer, format: int64, minimum: 1 }
    UserIdPath:
      name: id
      in: path
      required: true
      description: Pixiv user ID.
      schema: { type: integer, format: int64, minimum: 1 }
    OffsetQuery:
      name: offset
      in: query
      required: false
      description: Offset for offset-paginated list endpoints.
      schema: { type: integer, format: int64, minimum: 0, default: 0 }
    MaxBookmarkIdQuery:
      name: max_bookmark_id
      in: query
      required: false
      description: Cursor for the next bookmarks page; pass `next_max_bookmark_id` from the previous response.
      schema: { type: integer, format: int64, minimum: 1 }
    RestrictQuery:
      name: restrict
      in: query
      required: false
      description: Visibility scope (public or private).
      schema: { $ref: '#/components/schemas/Restrict' }
    IllustTypeQuery:
      name: type
      in: query
      required: false
      description: Illust type filter; both are returned when omitted (where supported).
      schema: { $ref: '#/components/schemas/IllustType' }
    DownloadIdPath:
      name: id
      in: path
      required: true
      description: Download job identifier returned by `POST /downloads`.
      schema: { type: string, minLength: 1 }
    DownloadStatusListQuery:
      name: status
      in: query
      required: false
      description: |
        Comma-separated subset of `DownloadStatus` to include. Omit for no
        filter. Example: `queued,running`.
      schema:
        type: string
      example: queued,running
    DownloadPageQuery:
      name: page
      in: query
      required: false
      description: 1-based page index.
      schema: { type: integer, minimum: 1, default: 1 }
    DownloadPerPageQuery:
      name: per_page
      in: query
      required: false
      description: Items per page; clamped to `[1, 100]`.
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    DownloadUpdatedSinceQuery:
      name: updated_since
      in: query
      required: false
      description: |
        RFC3339 timestamp. Only jobs with `updated_at >= updated_since`
        are returned. Used by the frontend to load the recent-tracked
        window without scanning the whole history.
      schema: { type: string, format: date-time }

  responses:
    NoContent:
      description: Action succeeded; no body.
    Unauthenticated:
      description: No valid Pixiv session. Call `POST /auth/login` first.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found on Pixiv.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Invalid parameters.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Upstream:
      description: Pixiv upstream returned an unexpected error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string, example: ok }

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: unauthenticated
        message:
          type: string
          description: Human-readable error message.
        detail:
          type: string
          description: Optional additional context (e.g., upstream body).

    Restrict:
      type: string
      enum: [public, private]
      default: public

    IllustType:
      type: string
      enum: [illust, manga]

    RankingMode:
      type: string
      enum:
        - day
        - week
        - month
        - day_male
        - day_female
        - week_original
        - week_rookie
        - day_manga
        - day_r18
        - day_male_r18
        - day_female_r18
        - week_r18
        - week_r18g

    SearchTarget:
      type: string
      enum:
        - partial_match_for_tags
        - exact_match_for_tags
        - title_and_caption
        - keyword
      default: partial_match_for_tags

    SearchSort:
      type: string
      enum: [date_desc, date_asc, popular_desc]
      default: date_desc

    LoginRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Long-lived Pixiv OAuth refresh token. See README for how to obtain.

    AuthStatus:
      type: object
      required: [authenticated]
      properties:
        authenticated: { type: boolean }
        user_id:       { type: integer, format: int64, nullable: true }
        user_name:     { type: string, nullable: true }
        expires_at:    { type: string, format: date-time, nullable: true }

    BookmarkRequest:
      type: object
      properties:
        restrict: { $ref: '#/components/schemas/Restrict' }

    BookmarkDetail:
      type: object
      required: [is_bookmarked, restrict]
      properties:
        is_bookmarked: { type: boolean }
        restrict:      { $ref: '#/components/schemas/Restrict' }

    FollowRequest:
      type: object
      properties:
        restrict: { $ref: '#/components/schemas/Restrict' }

    # The schemas below (plus the pixivgo sub-schemas defined further down,
    # after UgoiraMetadataResponse) carry `x-go-type` so oapi-codegen aliases
    # them to `pixivgo.*` (zero handler conversion, FlexInt and nullable
    # semantics preserved). `properties` sit alongside `x-go-type` so non-Go
    # consumers (openapi-typescript, Swagger UI, /openapi.json) see the wire
    # format. Keep `properties` in sync with pixivgo's models.go on upgrades.
    Illust:
      x-go-type: pixivgo.IllustrationInfo
      x-go-type-import: &pixivgoImport
        name: pixivgo
        path: github.com/txperl/pixivgo
      type: object
      description: Pixiv illustration metadata. Shape mirrors pixivgo.IllustrationInfo.
      required:
        - id
        - title
        - type
        - image_urls
        - caption
        - restrict
        - user
        - tags
        - tools
        - create_date
        - page_count
        - width
        - height
        - sanity_level
        - x_restrict
        - series
        - meta_single_page
        - meta_pages
        - total_view
        - total_bookmarks
        - is_bookmarked
        - visible
        - is_muted
        - illust_ai_type
        - illust_book_style
        - restriction_attributes
      properties:
        id:                { type: integer, format: int64 }
        title:             { type: string }
        type:              { type: string }
        image_urls:        { $ref: '#/components/schemas/ImageUrls' }
        caption:           { type: string }
        restrict:          { type: integer, format: int64 }
        user:              { $ref: '#/components/schemas/User' }
        tags:
          type: array
          items: { $ref: '#/components/schemas/IllustrationTag' }
        tools:
          type: array
          items: { type: string }
        create_date:       { type: string }
        page_count:        { type: integer, format: int64 }
        width:             { type: integer, format: int64 }
        height:            { type: integer, format: int64 }
        sanity_level:      { type: integer, format: int64 }
        x_restrict:        { type: integer, format: int64 }
        # OpenAPI 3.0: `nullable` on a bare $ref is ignored, so wrap in allOf.
        series:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Series'
        meta_single_page:  { $ref: '#/components/schemas/MetaSinglePage' }
        meta_pages:
          type: array
          items: { $ref: '#/components/schemas/MetaPage' }
        total_view:        { type: integer, format: int64 }
        total_bookmarks:   { type: integer, format: int64 }
        is_bookmarked:     { type: boolean }
        visible:           { type: boolean }
        is_muted:          { type: boolean }
        illust_ai_type:    { type: integer, format: int64 }
        illust_book_style: { type: integer, format: int64 }
        total_comments:    { type: integer, format: int64 }
        restriction_attributes:
          type: array
          items: { type: string }

    User:
      x-go-type: pixivgo.UserInfo
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv user summary. Shape mirrors pixivgo.UserInfo.
      required: [id, name, account, profile_image_urls, is_followed]
      properties:
        id:                      { type: integer, format: int64 }
        name:                    { type: string }
        account:                 { type: string }
        profile_image_urls:      { $ref: '#/components/schemas/ProfileImageUrls' }
        comment:                 { type: string }
        is_followed:             { type: boolean, nullable: true }
        is_access_blocking_user: { type: boolean }
        is_accept_request:       { type: boolean }

    UserPreview:
      x-go-type: pixivgo.UserPreview
      x-go-type-import: *pixivgoImport
      type: object
      description: User + a few sample illusts. Shape mirrors pixivgo.UserPreview.
      required: [user, illusts, novels, is_muted]
      properties:
        user: { $ref: '#/components/schemas/User' }
        illusts:
          type: array
          items: { $ref: '#/components/schemas/Illust' }
        novels:
          type: array
          items: { $ref: '#/components/schemas/Novel' }
        is_muted: { type: boolean }

    IllustPage:
      type: object
      required: [illusts]
      properties:
        illusts:
          type: array
          items: { $ref: '#/components/schemas/Illust' }
        next_offset:
          type: integer
          format: int64
          nullable: true
          description: Next offset to pass back, or null if no further page.
        next_max_bookmark_id:
          type: integer
          format: int64
          nullable: true
          description: Set only by `/users/{id}/bookmarks`; pass back as `max_bookmark_id`.

    UserIllustsPage:
      type: object
      required: [user, illusts]
      properties:
        user:
          $ref: '#/components/schemas/User'
        illusts:
          type: array
          items: { $ref: '#/components/schemas/Illust' }
        next_offset:
          type: integer
          format: int64
          nullable: true

    UserDetailPage:
      type: object
      required: [user, profile, profile_publicity, workspace]
      properties:
        user:              { $ref: '#/components/schemas/User' }
        profile:           { $ref: '#/components/schemas/Profile' }
        profile_publicity: { $ref: '#/components/schemas/ProfilePublicity' }
        workspace:         { $ref: '#/components/schemas/Workspace' }

    Profile:
      x-go-type: pixivgo.Profile
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv user profile. Shape mirrors pixivgo.Profile.
      required:
        - webpage
        - gender
        - birth
        - birth_day
        - birth_year
        - region
        - address_id
        - country_code
        - job
        - job_id
        - total_follow_users
        - total_mypixiv_users
        - total_illusts
        - total_manga
        - total_novels
        - total_illust_bookmarks_public
        - total_illust_series
        - total_novel_series
        - background_image_url
        - twitter_account
        - twitter_url
        - pawoo_url
        - is_premium
        - is_using_custom_profile_image
      properties:
        webpage:                        { type: string, nullable: true }
        gender:                         { type: string }
        birth:                          { type: string }
        birth_day:                      { type: string }
        birth_year:                     { type: integer, format: int64 }
        region:                         { type: string }
        address_id:                     { type: integer, format: int64 }
        country_code:                   { type: string }
        job:                            { type: string }
        job_id:                         { type: integer, format: int64 }
        total_follow_users:             { type: integer, format: int64 }
        total_mypixiv_users:            { type: integer, format: int64 }
        total_illusts:                  { type: integer, format: int64 }
        total_manga:                    { type: integer, format: int64 }
        total_novels:                   { type: integer, format: int64 }
        total_illust_bookmarks_public:  { type: integer, format: int64 }
        total_illust_series:            { type: integer, format: int64 }
        total_novel_series:             { type: integer, format: int64 }
        background_image_url:           { type: string }
        twitter_account:                { type: string }
        twitter_url:                    { type: string, nullable: true }
        pawoo_url:                      { type: string, nullable: true }
        is_premium:                     { type: boolean }
        is_using_custom_profile_image:  { type: boolean }

    ProfilePublicity:
      x-go-type: pixivgo.ProfilePublicity
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv profile publicity flags. Shape mirrors pixivgo.ProfilePublicity.
      required: [gender, region, birth_day, birth_year, job, pawoo]
      properties:
        gender:     { type: string }
        region:     { type: string }
        birth_day:  { type: string }
        birth_year: { type: string }
        job:        { type: string }
        pawoo:      { type: boolean }

    Workspace:
      x-go-type: pixivgo.Workspace
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv workspace info. Shape mirrors pixivgo.Workspace.
      required:
        - pc
        - monitor
        - tool
        - scanner
        - tablet
        - mouse
        - printer
        - desktop
        - music
        - desk
        - chair
        - comment
        - workspace_image_url
      properties:
        pc:                  { type: string }
        monitor:             { type: string }
        tool:                { type: string }
        scanner:             { type: string }
        tablet:              { type: string }
        mouse:               { type: string }
        printer:             { type: string }
        desktop:             { type: string }
        music:               { type: string }
        desk:                { type: string }
        chair:               { type: string }
        comment:             { type: string }
        workspace_image_url: { type: string, nullable: true }

    UserPreviewPage:
      type: object
      required: [user_previews]
      properties:
        user_previews:
          type: array
          items: { $ref: '#/components/schemas/UserPreview' }
        next_offset:
          type: integer
          format: int64
          nullable: true

    IllustDetailResponse:
      x-go-type: pixivgo.IllustDetailResponse
      x-go-type-import: *pixivgoImport
      type: object
      description: Wrapper for a single illust detail. Mirrors pixivgo.IllustDetailResponse.
      required: [illust]
      properties:
        illust: { $ref: '#/components/schemas/Illust' }

    UgoiraMetadataResponse:
      x-go-type: pixivgo.UgoiraMetadataResponse
      x-go-type-import: *pixivgoImport
      type: object
      description: Ugoira (animated illust) metadata. Mirrors pixivgo.UgoiraMetadataResponse.
      required: [ugoira_metadata]
      properties:
        ugoira_metadata: { $ref: '#/components/schemas/UgoiraMetadata' }

    # --- pixivgo sub-schemas ----------------------------------------------
    # Same `x-go-type` pattern as the schemas above: oapi-codegen emits these
    # as type aliases to pixivgo.*; the explicit properties exist only for
    # non-Go consumers of the spec.
    ProfileImageUrls:
      x-go-type: pixivgo.ProfileImageUrls
      x-go-type-import: *pixivgoImport
      type: object
      required: [medium]
      properties:
        medium: { type: string }

    ImageUrls:
      x-go-type: pixivgo.ImageUrls
      x-go-type-import: *pixivgoImport
      type: object
      required: [square_medium, medium, large]
      properties:
        square_medium: { type: string }
        medium:        { type: string }
        large:         { type: string }

    IllustrationTag:
      x-go-type: pixivgo.IllustrationTag
      x-go-type-import: *pixivgoImport
      type: object
      required: [name, translated_name]
      properties:
        name:            { type: string }
        translated_name: { type: string, nullable: true }

    Series:
      x-go-type: pixivgo.Series
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv returns `{}` instead of `null` for empty series; in that case `id` is 0.
      required: [id, title]
      properties:
        id:    { type: integer, format: int64 }
        title: { type: string }

    MetaSinglePage:
      x-go-type: pixivgo.MetaSinglePage
      x-go-type-import: *pixivgoImport
      type: object
      properties:
        original_image_url: { type: string }

    MetaPage:
      x-go-type: pixivgo.MetaPage
      x-go-type-import: *pixivgoImport
      type: object
      required: [image_urls]
      properties:
        image_urls: { $ref: '#/components/schemas/ImageUrls' }

    Novel:
      x-go-type: pixivgo.NovelInfo
      x-go-type-import: *pixivgoImport
      type: object
      description: Pixiv novel metadata. Shape mirrors pixivgo.NovelInfo.
      required:
        - id
        - title
        - caption
        - restrict
        - x_restrict
        - is_original
        - image_urls
        - create_date
        - tags
        - page_count
        - text_length
        - user
        - series
        - is_bookmarked
        - total_bookmarks
        - total_view
        - visible
        - total_comments
        - is_muted
        - is_mypixiv_only
        - is_x_restricted
        - novel_ai_type
      properties:
        id:              { type: integer, format: int64 }
        title:           { type: string }
        caption:         { type: string }
        restrict:        { type: integer, format: int64 }
        x_restrict:      { type: integer, format: int64 }
        is_original:     { type: boolean }
        image_urls:      { $ref: '#/components/schemas/ImageUrls' }
        create_date:     { type: string }
        tags:
          type: array
          items: { $ref: '#/components/schemas/NovelTag' }
        page_count:      { type: integer, format: int64 }
        text_length:     { type: integer, format: int64 }
        user:            { $ref: '#/components/schemas/User' }
        series:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Series'
        is_bookmarked:   { type: boolean }
        total_bookmarks: { type: integer, format: int64 }
        total_view:      { type: integer, format: int64 }
        visible:         { type: boolean }
        total_comments:  { type: integer, format: int64 }
        is_muted:        { type: boolean }
        is_mypixiv_only: { type: boolean }
        is_x_restricted: { type: boolean }
        novel_ai_type:   { type: integer, format: int64 }
        comment_access_control: { type: integer, format: int64 }

    NovelTag:
      x-go-type: pixivgo.NovelTag
      x-go-type-import: *pixivgoImport
      type: object
      required: [name, translated_name, added_by_uploaded_user]
      properties:
        name:                   { type: string }
        translated_name:        { type: string, nullable: true }
        added_by_uploaded_user: { type: boolean }

    UgoiraMetadata:
      x-go-type: pixivgo.UgoiraMetadata
      x-go-type-import: *pixivgoImport
      type: object
      required: [zip_urls, frames]
      properties:
        zip_urls: { $ref: '#/components/schemas/UgoiraZipUrls' }
        frames:
          type: array
          items: { $ref: '#/components/schemas/UgoiraFrame' }

    UgoiraZipUrls:
      x-go-type: pixivgo.UgoiraZipUrls
      x-go-type-import: *pixivgoImport
      type: object
      required: [medium]
      properties:
        medium: { type: string }

    UgoiraFrame:
      x-go-type: pixivgo.UgoiraFrame
      x-go-type-import: *pixivgoImport
      type: object
      required: [file, delay]
      properties:
        file:  { type: string }
        delay: { type: integer, format: int64 }

    DownloadStatus:
      type: string
      description: Lifecycle state of a download job or task.
      enum: [queued, running, completed, failed, cancelled]

    DownloadIllustType:
      type: string
      description: Pixiv artwork type the job was created for.
      enum: [illust, manga, ugoira]

    DownloadTask:
      type: object
      required: [id, job_id, url, file_path, status, size_bytes, downloaded_bytes]
      properties:
        id:               { type: string }
        job_id:           { type: string }
        url:              { type: string, description: "Final request URL (after pximg mirror rewrite)." }
        file_path:        { type: string, description: "Target path on disk." }
        status:           { $ref: '#/components/schemas/DownloadStatus' }
        size_bytes:       { type: integer, format: int64, description: "Content-Length, or -1 if unknown." }
        downloaded_bytes: { type: integer, format: int64 }
        error:            { type: string, nullable: true }
        started_at:       { type: string, format: date-time, nullable: true }
        finished_at:      { type: string, format: date-time, nullable: true }

    DownloadJob:
      type: object
      required: [id, illust_id, illust_type, status, created_at, updated_at, tasks]
      properties:
        id:          { type: string }
        illust_id:   { type: integer, format: int64 }
        illust_type: { $ref: '#/components/schemas/DownloadIllustType' }
        title:       { type: string }
        preview_url: { type: string, description: "Thumbnail (square_medium → medium → large). Absent on jobs persisted before this field existed." }
        status:      { $ref: '#/components/schemas/DownloadStatus' }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/DownloadTask' }

    DownloadJobList:
      type: object
      required: [jobs, total, page, per_page, active_count, done_count]
      properties:
        jobs:
          type: array
          items: { $ref: '#/components/schemas/DownloadJob' }
        total:
          type: integer
          description: Total jobs matching the filter (status + updated_since).
        page:
          type: integer
          minimum: 1
          description: Echo of the requested 1-based page index after clamping.
        per_page:
          type: integer
          minimum: 1
          description: Echo of the effective page size after clamping.
        active_count:
          type: integer
          description: |
            Global count of `queued` + `running` jobs (independent of filter).
            Drives the sidebar badge.
        done_count:
          type: integer
          description: Global count of `completed` jobs (independent of filter).

    SubmitDownloadRequest:
      type: object
      required: [illust_id]
      properties:
        illust_id:
          type: integer
          format: int64
          minimum: 1
          description: Pixiv illustration ID.

    ClearDownloadsResponse:
      type: object
