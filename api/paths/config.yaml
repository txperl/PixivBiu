root:
  get:
    operationId: getConfig
    summary: Get the effective config + per-key source layering
    description: |
      Returns three views of the current config:
      - `effective`: the values the running process is actually using
      - `file`: the user overrides currently persisted in settings.json
      - `sources`: per dotted-key origin (`defaults` | `file` | `env`)

      Sensitive fields (e.g. `pixiv.proxy`) are masked in both `effective`
      and `file` views. PATCH treats the mask sentinel as "do not modify",
      so the frontend can safely round-trip a redacted view back as a PATCH.
    tags: [config]
    responses:
      '200':
        description: Current config view.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/ConfigView' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
  patch:
    operationId: patchConfig
    summary: Merge a partial update into the persisted overrides
    description: |
      Applies a flat or nested map of dotted-key → value writes to the
      file layer, revalidates the candidate config end-to-end, and
      atomically writes the diff-against-defaults back to settings.json.
      Empty bodies, unknown keys, type mismatches, range/enum violations
      are all rejected with 400.

      On success the change is applied live for hot-reloadable keys:
      `effective` advances immediately and the running services pick it
      up. Restart-required keys still only advance `file`; they appear
      in `pending_restart` until the process restarts (see
      `POST /config/restart`). Env-layer overrides keep winning at
      restart time until unset.
    tags: [config]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/ConfigPatch' }
    responses:
      '200':
        description: Patch applied. Returns the refreshed view.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/ConfigView' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }

reset:
  post:
    operationId: resetConfig
    summary: Drop overrides from the file layer (per key or wholesale)
    description: |
      Removes selected keys from settings.json so they fall back to the
      next layer's value (env or default). With `all: true` the entire
      file layer is cleared. Exactly one of `all: true` or a non-empty
      `keys` array must be present — empty bodies, both-at-once, and
      mutually-exclusive conflicts are all rejected with 400.
    tags: [config]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/ConfigResetRequest' }
    responses:
      '200':
        description: Reset applied. Returns the refreshed view.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/ConfigView' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }

restart:
  post:
    operationId: restartConfig
    summary: Gracefully restart the process to apply restart-required settings
    description: |
      Triggers a graceful self-restart: the server drains in-flight work
      (HTTP requests, download workers, the pixiv refresh loop) and then
      re-executes itself, reloading settings.json from disk. Use this to
      apply changes to restart-required keys (those listed in
      `pending_restart`); hot-reloadable keys already take effect on PATCH.

      The 202 response is flushed before the drain begins, so the client
      should expect the connection (and any SSE streams) to drop shortly
      after. Downloads resume automatically on boot and SSE clients
      reconnect with Last-Event-ID, so a restart is non-destructive.
    tags: [config]
    responses:
      '202':
        description: Restart accepted; the process will drain and re-exec.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/ConfigRestartAccepted' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }

namingPreview:
  post:
    operationId: previewNaming
    summary: Render the download naming templates against a fixed sample work
    description: |
      Runs the REAL Go `text/template` renderer against a fixed,
      representative work and returns the example output paths. Any
      omitted template falls back to the current effective value.

      This endpoint is **non-persisting** — nothing is written to
      settings.json. It exists to power a live preview in the settings
      UI, so per-template parse/exec failures are returned in `fields`
      (keyed by dotted config path) and DO NOT cause a non-200: the
      editor can show inline errors without an HTTP error while the user
      is mid-edit. Authoritative validation still happens on PATCH.
    tags: [config]
    requestBody:
      required: false
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/NamingPreviewRequest' }
    responses:
      '200':
        description: Rendered example. Inspect `fields` for per-template errors.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/NamingPreviewResponse' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }

schema:
  get:
    operationId: getConfigSchema
    summary: Get the JSON Schema describing all settings
    description: |
      Returns a JSON Schema (Draft 2020-12) reflected from the server's
      Config struct, with per-field metadata (`x-cfg-category`,
      `x-cfg-sensitive`, `x-cfg-restart-required`, `x-cfg-advanced`,
      `x-cfg-go-type`). Frontend renders forms from this; backend uses
      the same source-of-truth for validation.
    tags: [config]
    responses:
      '200':
        description: JSON Schema document.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
