login:
  post:
    operationId: login
    summary: Log in with a refresh token
    description: |
      Exchanges the Pixiv OAuth refresh token for a short-lived access
      token and persists it server-side; subsequent authenticated
      endpoints reuse that stored session.
    tags: [auth]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/LoginRequest' }
    responses:
      '200':
        description: Authenticated. The access token is stored server-side.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/AuthStatus' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

oauthStart:
  post:
    operationId: startOAuth
    summary: Begin a browser-driven Pixiv OAuth (PKCE) login
    description: |
      Generates a server-side PKCE verifier and returns the hosted Pixiv
      login URL the client should open in a popup. The server keeps the
      verifier indexed by `state`; the client posts `state` + the
      authorisation `code` back to `/auth/oauth/exchange` to complete login.
      Issued states expire after ~10 minutes and are single-use.
    tags: [auth]
    responses:
      '200':
        description: Login flow started.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/OAuthStartResponse' }

oauthExchange:
  post:
    operationId: exchangeOAuth
    summary: Complete a browser-driven Pixiv OAuth login
    description: |
      Trades the Pixiv authorisation code (returned in the callback URL of
      the hosted login page) for a refresh + access token using the PKCE
      verifier the server stored under `state`. `code` may be the bare
      code, or the full callback URL — the server extracts `?code=…`.
      Persists the resulting tokens just like `/auth/login`.
    tags: [auth]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/OAuthExchangeRequest' }
    responses:
      '200':
        description: Authenticated. The access token is stored server-side.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/AuthStatus' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

logout:
  post:
    operationId: logout
    summary: Log out the current session
    description: Clears the persisted tokens and removes the on-disk state file. Idempotent.
    tags: [auth]
    responses:
      '204': { $ref: '../openapi.yaml#/components/responses/NoContent' }

status:
  get:
    operationId: getAuthStatus
    summary: Get current auth status
    tags: [auth]
    responses:
      '200':
        description: Current auth status.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/AuthStatus' }

connectivity:
  post:
    operationId: checkConnectivity
    summary: Check whether the backend can reach Pixiv
    description: |
      Probes Pixiv reachability over the backend's current network path
      (proxy / SNI bypass) without authenticating. The login onboarding
      calls this before sign-in. Optionally accepts a `proxy` to test a
      candidate proxy URL; when the probe succeeds with a supplied proxy
      and no Pixiv session exists yet, that proxy is persisted so the
      imminent OAuth login uses it. `reachable:false` is a normal 200
      result (the answer to the question), not an error.
    tags: [auth]
    requestBody:
      required: false
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/ConnectivityRequest' }
    responses:
      '200':
        description: Probe completed; inspect `reachable`.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/ConnectivityStatus' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }

proxyDetect:
  get:
    operationId: detectProxies
    summary: Detect proxy candidates from the OS configuration
    description: |
      Reads the operating system's configured proxy — macOS system proxy via
      `scutil`, Windows via the registry — plus the HTTP(S)_PROXY / ALL_PROXY
      environment variables, and returns the candidates ordered system-first.
      Login onboarding calls this after a direct connectivity probe fails, so
      it can offer (and auto-test) a system proxy the user enabled without
      TUN mode — a setting that's invisible to env vars. Reads local config
      only: no network I/O, nothing persisted (test/persist a candidate via
      `/auth/connectivity`). A PAC-only (auto-config URL) setup is not
      evaluated and yields no candidates. Deliberately unauthenticated, like
      `/auth/connectivity`.
    tags: [auth]
    responses:
      '200':
        description: Detection completed; `candidates` may be empty.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/DetectedProxies' }
