login:
  post:
    operationId: login
    summary: Log in with a refresh token
    description: |
      Exchanges the Pixiv OAuth refresh token for a short-lived access
      token and persists it server-side; subsequent authenticated
      endpoints reuse that stored session.
    tags: [auth]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/LoginRequest' }
    responses:
      '200':
        description: Authenticated. The access token is stored server-side.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/AuthStatus' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

logout:
  post:
    operationId: logout
    summary: Log out the current session
    description: Clears the persisted tokens and removes the on-disk state file. Idempotent.
    tags: [auth]
    responses:
      '204': { $ref: '../openapi.yaml#/components/responses/NoContent' }

status:
  get:
    operationId: getAuthStatus
    summary: Get current auth status
    tags: [auth]
    responses:
      '200':
        description: Current auth status.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/AuthStatus' }
