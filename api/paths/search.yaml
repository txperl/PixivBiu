illusts:
  get:
    operationId: searchIllusts
    summary: Search illusts
    description: Matches by keyword or tag; see `search_target` for matching mode and `sort` for ordering.
    tags: [search]
    parameters:
      - name: word
        in: query
        required: true
        schema: { type: string, minLength: 1 }
      - name: search_target
        in: query
        required: false
        schema: { $ref: '../openapi.yaml#/components/schemas/SearchTarget' }
      - name: sort
        in: query
        required: false
        schema: { $ref: '../openapi.yaml#/components/schemas/SearchSort' }
      - name: start_date
        in: query
        required: false
        description: Lower bound `YYYY-MM-DD` for creation date.
        schema: { type: string, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' }
      - name: end_date
        in: query
        required: false
        description: Upper bound `YYYY-MM-DD` for creation date.
        schema: { type: string, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' }
      - $ref: '../openapi.yaml#/components/parameters/DurationQuery'
      - $ref: '../openapi.yaml#/components/parameters/ExcludeAiQuery'
      - $ref: '../openapi.yaml#/components/parameters/OffsetQuery'
      - $ref: '../openapi.yaml#/components/parameters/ClientModeQuery'
    responses:
      '200':
        description: Search results page.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/IllustPage' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

users:
  get:
    operationId: searchUsers
    summary: Search users
    description: Matches Pixiv display name or account.
    tags: [search]
    parameters:
      - name: word
        in: query
        required: true
        schema: { type: string, minLength: 1 }
      - name: sort
        in: query
        required: false
        schema: { $ref: '../openapi.yaml#/components/schemas/SearchSort' }
      - $ref: '../openapi.yaml#/components/parameters/DurationQuery'
      - $ref: '../openapi.yaml#/components/parameters/OffsetQuery'
      - $ref: '../openapi.yaml#/components/parameters/ClientModeQuery'
    responses:
      '200':
        description: User search results.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/UserPreviewPage' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }
