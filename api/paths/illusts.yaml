byId:
  get:
    operationId: getIllust
    summary: Get illust detail
    tags: [illusts]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/IllustIdPath'
    responses:
      '200':
        description: Illustration detail.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/IllustDetailResponse' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

ranking:
  get:
    operationId: listRanking
    summary: List ranked illusts
    tags: [illusts]
    parameters:
      - name: mode
        in: query
        required: false
        schema:
          allOf:
            - $ref: '../openapi.yaml#/components/schemas/RankingMode'
          default: day
      - name: date
        in: query
        required: false
        description: Ranking date in `YYYY-MM-DD`. Omit for the latest.
        schema: { type: string, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' }
      - $ref: '../openapi.yaml#/components/parameters/OffsetQuery'
    responses:
      '200':
        description: Ranking page.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/IllustPage' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

recommended:
  get:
    operationId: listRecommended
    summary: List recommended illusts
    tags: [illusts]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/IllustTypeQuery'
      - $ref: '../openapi.yaml#/components/parameters/OffsetQuery'
    responses:
      '200':
        description: Recommendation page.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/IllustPage' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

following:
  get:
    operationId: listFollowingIllusts
    summary: List illusts from followed users
    tags: [illusts]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/RestrictQuery'
      - $ref: '../openapi.yaml#/components/parameters/OffsetQuery'
    responses:
      '200':
        description: Following feed page.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/IllustPage' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

ugoira:
  get:
    operationId: getUgoiraMetadata
    summary: Get ugoira metadata
    description: |
      Returns the frame-timing manifest and the zip URL packaging
      each frame. Used by clients to render Pixiv's animated
      illustrations.
    tags: [illusts]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/IllustIdPath'
    responses:
      '200':
        description: Ugoira metadata.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/UgoiraMetadataResponse' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }

bookmark:
  get:
    operationId: getBookmarkDetail
    summary: Get current user's bookmark detail for an illust
    tags: [illusts]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/IllustIdPath'
    responses:
      '200':
        description: Bookmark detail.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/BookmarkDetail' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }
  put:
    operationId: addBookmark
    summary: Bookmark an illust
    tags: [illusts]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/IllustIdPath'
    requestBody:
      required: false
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/BookmarkRequest' }
    responses:
      '204': { $ref: '../openapi.yaml#/components/responses/NoContent' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }
  delete:
    operationId: deleteBookmark
    summary: Remove an illust bookmark
    tags: [illusts]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/IllustIdPath'
    responses:
      '204': { $ref: '../openapi.yaml#/components/responses/NoContent' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }
