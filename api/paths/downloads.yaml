root:
  post:
    operationId: submitDownload
    summary: Submit a download job
    description: |
      Resolves the illust on Pixiv, builds one task per page (or one
      per ugoira zip), enqueues the work, and returns the Job. The
      response is `202 Accepted`; the client follows progress via
      the `download` topic on `GET /events`.
    tags: [downloads]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../openapi.yaml#/components/schemas/SubmitDownloadRequest' }
    responses:
      '202':
        description: Job accepted.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/DownloadJob' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '502': { $ref: '../openapi.yaml#/components/responses/Upstream' }
  get:
    operationId: listDownloads
    summary: List download jobs (paginated)
    description: |
      Server-paginated list. Order is newest first. Without filters
      every job is returned, but `page` / `per_page` always apply.
      Response carries the total count plus global `active_count` /
      `done_count` so clients don't need a separate counts endpoint.
    tags: [downloads]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/DownloadStatusListQuery'
      - $ref: '../openapi.yaml#/components/parameters/DownloadPageQuery'
      - $ref: '../openapi.yaml#/components/parameters/DownloadPerPageQuery'
      - $ref: '../openapi.yaml#/components/parameters/DownloadUpdatedSinceQuery'
    responses:
      '200':
        description: Jobs list page.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/DownloadJobList' }
      '400': { $ref: '../openapi.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }

byId:
  get:
    operationId: getDownload
    summary: Get a download job
    tags: [downloads]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/DownloadIdPath'
    responses:
      '200':
        description: The job.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/DownloadJob' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
  delete:
    operationId: removeDownload
    summary: Remove a download job from history
    description: |
      Deletes a terminal job (completed / failed / cancelled) from the
      store. The Download List is a history log: this removes the
      record only — already-downloaded files on disk are not touched.
      Returns `409` if the job is still running — the client must
      `POST /downloads/{id}/cancel` first. To delete files, use a file
      manager.
    tags: [downloads]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/DownloadIdPath'
    responses:
      '204': { $ref: '../openapi.yaml#/components/responses/NoContent' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '409':
        description: Job is still running — cancel it before removing.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/Error' }

byIdCancel:
  post:
    operationId: cancelDownload
    summary: Cancel a running download job
    description: Cancels every non-terminal task in the job. Returns `409` if the job is already in a terminal state.
    tags: [downloads]
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/DownloadIdPath'
    responses:
      '204': { $ref: '../openapi.yaml#/components/responses/NoContent' }
      '401': { $ref: '../openapi.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../openapi.yaml#/components/responses/NotFound' }
      '409':
        description: Job is already in a terminal state.
        content:
          application/json:
            schema: { $ref: '../openapi.yaml#/components/schemas/Error' }
