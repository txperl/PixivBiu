package: api
output: internal/api/server.gen.go
generate:
  chi-server: true
  models: true
  embedded-spec: true

import-mapping:
  # Paths live under paths/*.yaml and $ref ../openapi.yaml for shared schemas; that path is
  # treated as external unless mapped. "-" (v2.4.0+) is self-mapping: same Go package.
  ../openapi.yaml: "-"

output-options:
  # Pruning drops IllustType/RankingMode/LoginRequest etc.: back-$refs from paths/*.yaml look
  # external to the pruner under self-mapping (~260 lines missing, build breaks). Downside:
  # truly unused schemas are emitted too.
  skip-prune: true
