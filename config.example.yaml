server:
  host: 0.0.0.0
  port: 8080
  timeouts:
    read: 15s
    write: 15s
    shutdown: 10s

log:
  level: info # debug | info | warn | error
  format: text # text | json

pixiv:
  proxy: "" # HTTP/SOCKS proxy URL; empty = direct. Also applies to downloads.
  language: zh-cn # Accept-Language sent to Pixiv (tag translations)
  bypass_sni:
    false # true = use pixivgo/bypass (DoH + alt SNI) for firewalled networks.
    # Only covers the API host; for downloads, set download.pximg_base.
  state_file: ./usr/state.json # token persistence; refresh_token NEVER lives in this config

download:
  # Output path templates use Go's text/template. Every template is parsed
  # at boot — syntax errors fail fast. Every path segment is sanitised
  # automatically after render, so you do not need an explicit `| sanitize`
  # in your templates; the function is still exposed for intermediate use.
  #
  # Template context fields:
  #   .IllustID  .Title  .Type  .UserID  .UserName
  #   .CreatedAt (illust creation time, local)
  #   .Now       (submit time, local — shared across a Job's files)
  #   .Index     (1-based page number for multi-page; 0 for single)
  #   .Ext       (leading-dot extension derived from URL or ugoira format)
  #   .Home      (user home dir)
  #   .Root      (executable dir)
  #
  # Registered funcs: sanitize  pad  date  lower  upper  trunc  default
  #
  # A `/` in this template produces a subfolder.
  output_dir: "./downloads/{{.Now | date '2006-01-02'}}"
  file_template: "{{.IllustID}}_{{.Title | trunc 80}}{{.Ext}}"
  file_group_template: "{{.IllustID}}_{{.Title | trunc 80}}/{{.Index | pad 2}}{{.Ext}}"

  max_concurrent: 4
  http_timeout: 60s
  retry:
    max: 2
    initial_backoff: 1s

  referer: "https://app-api.pixiv.net/"
  pximg_base: "https://i.pximg.net" # set to a reverse proxy URL to rewrite image host

  ugoira:
    format: webp # webp | gif | none   (none = keep original zip, no conversion)

  store_file: ./usr/downloads.json # download index persistence

inbox:
  buffer_size: 200 # event ring buffer; drives Last-Event-ID replay window
  progress_throttle: 250ms # minimum gap between download.task.progress events for the same task
  heartbeat: 15s # SSE keep-alive comment interval


# Environment overrides use PIXIVBIU_ prefix, underscores map to dots.
# Examples:
#   PIXIVBIU_SERVER_PORT=9090
#   PIXIVBIU_LOG_LEVEL=debug
#   PIXIVBIU_SERVER_TIMEOUTS_SHUTDOWN=20s
#   PIXIVBIU_PIXIV_PROXY=http://127.0.0.1:7890
#   PIXIVBIU_PIXIV_BYPASS_SNI=true
#   PIXIVBIU_DOWNLOAD_MAX_CONCURRENT=8
#   PIXIVBIU_DOWNLOAD_UGOIRA_FORMAT=gif
#   PIXIVBIU_INBOX_BUFFER_SIZE=500
